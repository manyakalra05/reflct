name: Full DevSecOps Pipeline

on:
  push:
    branches: ["main", "dev"]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    # 🌍 GLOBAL ENV (applies to ALL steps)
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      ARCJET_KEY: ${{ secrets.ARCJET_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

    steps:
    # 🟢 STEP 1 - Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # 🟢 STEP 2 - Install dependencies
    - name: Install dependencies
      run: npm install

    # 🟢 STEP 3 - Lint check
    - name: Run ESLint
      run: npm run lint || true

    # 🟢 STEP 4 - Build check
    - name: Build project
      run: npm run build

    # 🟢 STEP 5 - Prisma validation (FIXED)
    - name: Validate Prisma schema
      run: npx prisma validate

    # 🔐 STEP 6 - Smart Secret Detection (FIXED)
    - name: Secret scan (improved)
      run: |
        echo "🔍 Scanning for exposed secrets..."

        FILES=$(find . -type f \
          ! -path "./node_modules/*" \
          ! -path "./.git/*" \
          ! -path "./.next/*")

        for file in $FILES; do
          if grep -qE "(API_KEY|SECRET|TOKEN|PASSWORD)\s*=\s*['\"]" "$file"; then
            echo "❌ Hardcoded secret found in $file"
            exit 1
          fi
        done

        echo "✅ No hardcoded secrets detected"

    # 🔐 STEP 7 - Block .env file
    - name: Block .env file
      run: |
        if [ -f ".env" ]; then
          echo "❌ .env file detected!"
          exit 1
        fi

    # 🔐 STEP 8 - Dependency vulnerabilities
    - name: Audit dependencies
      run: npm audit --audit-level=high || true

    # 🧠 STEP 9 - Context-aware scan (Research feature)
    - name: Context-aware scan
      run: |
        echo "🧠 Running smart scan..."

        grep -r "password" . \
          --exclude-dir=node_modules \
          --exclude-dir=.git \
          --exclude-dir=.next \
          && echo "⚠️ Review recommended"

    # 🔵 STEP 10 - Deploy (ONLY main branch)
    - name: Trigger Vercel Deploy
      if: github.ref == 'refs/heads/main'
      run: |
        curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

    # 🔴 STEP 11 - Final log
    - name: Done
      run: echo "🚀 Pipeline finished"
