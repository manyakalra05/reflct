name: DevSecOps Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      ARCJET_KEY: ${{ secrets.ARCJET_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

    steps:
    # STEP 1 - Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # STEP 2 - Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x

    # STEP 3 - Cache dependencies
    - name: Cache npm
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    # STEP 4 - Install dependencies
    - name: Install dependencies
      run: npm install

    # STEP 5 - Lint
    - name: Run ESLint
      run: npm run lint || true

    # STEP 6 - Build
    - name: Build project
      run: npm run build

    # STEP 7 - Prisma validation
    - name: Validate Prisma schema
      run: npx prisma validate || true

    # STEP 8 - Secret scan 
    - name: Secret scan
      run: |
        echo "Scanning for obvious hardcoded secrets..."

        grep -rE "(API_KEY|SECRET|TOKEN|PASSWORD)\s*=\s*['\"]" . \
          --exclude-dir=node_modules \
          --exclude-dir=.git \
          --exclude-dir=.next \
          || true

        echo "Secret scan completed (non-blocking)"

    # STEP 9 - Prevent .env commit
    - name: Block .env file
      run: |
        if [ -f ".env" ]; then
          echo ".env file detected!"
          exit 1
        fi

    # STEP 10 - Dependency audit
    - name: Audit dependencies
      run: npm audit --audit-level=high || true

    # STEP 11 - Context-aware scan
    - name: Context scan
      run: |
        echo "Running smart scan..."

        grep -r "password" . \
          --exclude-dir=node_modules \
          --exclude-dir=.git \
          --exclude-dir=.next \
          && echo "Review recommended"

    # STEP 12 - Deploy (ONLY main branch)
    - name: Trigger Vercel Deploy
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Triggering Vercel deployment..."

        if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
          echo "Missing VERCEL_DEPLOY_HOOK"
          exit 1
        fi

        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")

        echo "Vercel response: $RESPONSE"

        if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ]; then
          echo "Deployment failed"
          exit 1
        fi

        echo "Deployment triggered"

    # STEP 13 - Done
    - name: Done
      run: echo "Pipeline completed successfully"
